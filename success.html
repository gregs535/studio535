<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/studio535-ai/">
<title>Thank You | Studio 535</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
  
  // Track purchase completion
  const urlParams = new URLSearchParams(window.location.search);
  const product = urlParams.get('product');
  if (product) {
    gtag('event', 'purchase', {
      transaction_id: 'T_' + Date.now(),
      value: 0, // Will be populated from Stripe webhook
      currency: 'USD',
      items: [{ item_name: product }]
    });
  }
</script>
<style>
  .gradient-text { background: linear-gradient(90deg, #00d4ff, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
</style>
</head>
<body class="bg-gray-950 text-white font-sans antialiased min-h-screen flex items-center justify-center">

<div class="max-w-xl mx-auto text-center px-6">
  <div class="glass rounded-2xl p-12">
    <div class="text-6xl mb-6">🎉</div>
    <h1 class="text-4xl font-bold mb-4">Thank You!</h1>
    <p class="text-gray-400 text-xl mb-8">Your purchase was successful. Check your email for download links.</p>
    
    <div class="space-y-4 mb-8">
      <div class="p-4 bg-gray-900 rounded-lg text-left">
        <p class="text-cyan-400 font-semibold mb-1">📧 Check your inbox</p>
        <p class="text-gray-500 text-sm">Download links sent to your email</p>
      </div>
      <div class="p-4 bg-gray-900 rounded-lg text-left">
        <p class="text-cyan-400 font-semibold mb-1">💬 Questions?</p>
        <p class="text-gray-500 text-sm">Reply to your receipt email anytime</p>
      </div>
    </div>
    
    <div class="flex gap-4 justify-center">
      <a href="/products.html" class="px-6 py-3 bg-cyan-500 hover:bg-cyan-400 text-black font-semibold rounded-lg transition">Browse More Products</a>
      <a href="/" class="px-6 py-3 glass hover:bg-white/10 rounded-lg transition">Back to Home</a>
    </div>
  </div>
</div>

</body>
</html>
